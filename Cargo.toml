[package]
name = "tauri-shared"
version = "0.1.0"
edition = "2021"

[dependencies]
tauri = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
proc-macro2 = "1"
quote = "1"
syn = "1"
schemars = { version = "0.8", features = ["derive"] }
validator = { version = "0.16", features = ["derive"] }
chrono = "0.4"

[lib]
